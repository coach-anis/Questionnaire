<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكراً | Coach Anis</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #080808;
  color: #EFEFEF;
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 24px;
}

body::after {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(201,168,76,0.10) 0%, transparent 70%);
  pointer-events:none;
}

.card {
  max-width: 420px; width: 100%;
  background: #0F0F0F;
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  padding: 48px 32px;
  position: relative; z-index: 1;
  animation: popIn .5s ease;
}

@keyframes popIn {
  from { opacity:0; transform: scale(.95) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.icon { font-size: 56px; margin-bottom: 20px; display: block; }

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 2px;
  margin-bottom: 6px;
}

.title span { color: #C9A84C; }

.sub {
  font-size: 14px; color: #666;
  line-height: 1.8; margin-bottom: 32px;
}

.sub strong { color: #C9A84C; }

.divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, #C9A84C, transparent);
  margin: 0 auto 28px;
}

.btn-ig {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: linear-gradient(135deg, #C9A84C, #E8C97A);
  color: #000;
  padding: 14px 28px; border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px; font-weight: 900;
  text-decoration: none;
  transition: all .25s;
  margin-bottom: 12px;
}

.btn-ig:hover { box-shadow: 0 8px 24px rgba(201,168,76,.4); transform: translateY(-2px); }

.handle {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 4px; font-size: 11px;
  color: #444; margin-top: 24px;
}
</style>
</head>
<body>
<div class="card">
  <span class="icon">🏆</span>
  <div class="title">شكراً <span>لك!</span></div>
  <div class="divider"></div>
  <div class="sub">
    وصل تقييمك بنجاح ✅<br>
    سيتواصل معك <strong>Coach Anis</strong> خلال <strong>24 ساعة</strong>
  </div>
  <a href="https://instagram.com/coach__anis" class="btn-ig" target="_blank">
    📸 تابعني على الإنستغرام
  </a>
  <div class="handle">COACH ANIS · @coach__anis · 2025</div>
</div>
</body>
</html>
